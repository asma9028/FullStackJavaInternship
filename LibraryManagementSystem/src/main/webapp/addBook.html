<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<h1>Add a Book</h1>
	<form action="MainServlet" method="post">
		ISBN Number : <input type="text" name="isbn"/><br/>
		Book Name : <input type="text" name="bookName"/><br/>
		Book Type : <select name="bookType">
		<option value='G'>General</option>
		<option value='T'>Technical</option>
		</select><br/>
		Author Name : <select name="authorName">
		<option value="Paulo Coehlo">Paulo Coehlo</option>
		<option value="R.K.Narayan">R.K.Narayan</option>
		<option value="Robin Sharma">Robin Sharma</option>
		</select><br/>
		Book Cost : <input type="text" name="bookCost"/><br/>
		<button type="submit" name="operation" value="AddBooks">Add Books</button>
	</form>
</body>
	
</html>
